<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PÉNZÜGY KÖVETŐ</title>
<style>
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--tx:#e0e0e0;--tx2:#a0a0b0;--ac:#00b4d8;--in:#2ecc71;--ex:#e74c3c;--br:#2a2a4a;--pa:#2ecc71;--un:#e74c3c}
.light{--bg:#f5f5f5;--bg2:#fff;--bg3:#fff;--tx:#1a1a2e;--tx2:#666;--ac:#0077b6;--in:#27ae60;--ex:#e74c3c;--br:#ddd;--pa:#27ae60;--un:#e74c3c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);display:flex;min-height:100vh}
nav{width:220px;background:var(--bg2);padding:20px;position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;gap:4px;transition:transform .3s}
nav h2{font-size:1.1em;margin-bottom:16px;color:var(--ac)}
nav a{color:var(--tx2);text-decoration:none;padding:8px 12px;border-radius:6px;font-size:.95em;cursor:pointer}
nav a:hover,nav a.active{background:var(--bg3);color:var(--ac)}
nav hr{border-color:var(--br);margin:12px 0}
nav .theme-btn{font-size:.9em}
main{margin-left:220px;padding:30px 40px;flex:1;max-width:1200px}
h1{margin-bottom:24px;font-size:1.6em;color:var(--ac)}
h2{margin-bottom:12px;font-size:1.2em}
.page{display:none}
.page.active{display:block}
.cards{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.card{background:var(--bg3);padding:20px 28px;border-radius:10px;border:1px solid var(--br);flex:1;min-width:180px}
.card-label{font-size:.85em;color:var(--tx2);margin-bottom:6px}
.card-value{font-size:1.6em;font-weight:bold}
.card.income .card-value{color:var(--in)}
.card.expense .card-value{color:var(--ex)}
.c-balance{font-size:1.2em;margin-bottom:24px;padding:10px 16px;border-radius:8px}
.c-balance.pos{color:var(--in)}.c-balance.neg{color:var(--ex)}
.child-status{background:var(--bg3);border:1px solid var(--br);border-radius:10px;padding:20px 28px;margin-bottom:24px}
.child-row{display:flex;gap:16px;align-items:center;padding:6px 0;border-bottom:1px solid var(--br)}
.child-row:last-child{border-bottom:none}
.child-name{flex:1;font-weight:bold}
.child-amount{font-size:1.1em}
.child-paid{color:var(--pa)}.child-unpaid{color:var(--un)}
.panels{display:flex;gap:20px;flex-wrap:wrap}
.panel{background:var(--bg3);border:1px solid var(--br);border-radius:10px;padding:20px;flex:1;min-width:300px}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--br);font-size:.95em}
th{color:var(--tx2);font-weight:600;font-size:.85em;text-transform:uppercase}
td.income{color:var(--in)}td.expense{color:var(--ex)}
td.actions{white-space:nowrap}
.btn,button{background:var(--bg2);color:var(--tx);border:1px solid var(--br);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9em;text-decoration:none;display:inline-block}
.btn.accent{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn:hover,button:hover{opacity:.85}
.btn-sm{padding:4px 8px;font-size:.85em}
.btn-danger{border-color:var(--ex);color:var(--ex)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters input,.filters select{background:var(--bg2);color:var(--tx);border:1px solid var(--br);padding:6px 10px;border-radius:6px;font-size:.9em}
.toolbar{display:flex;gap:10px;margin-bottom:16px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{background:var(--bg2);padding:28px;border-radius:12px;border:1px solid var(--br);max-width:480px;width:90%;max-height:90vh;overflow-y:auto}
.modal-box h2{margin-bottom:16px}
.modal-box label{display:block;margin-bottom:12px;font-size:.9em;color:var(--tx2)}
.modal-box input,.modal-box select{display:block;width:100%;margin-top:4px;background:var(--bg);color:var(--tx);border:1px solid var(--br);padding:8px 12px;border-radius:6px;font-size:.95em}
.modal-box input[type=checkbox]{display:inline;width:auto;margin-right:6px}
.month-nav{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.month-nav span{font-size:1.4em;font-weight:bold}
.empty{color:var(--tx2);font-style:italic;padding:20px 0}
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--bg3);border:1px solid var(--br);color:var(--tx);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:1.2em}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
@media(max-width:768px){nav{transform:translateX(-100%)}body.nav-open nav{transform:translateX(0)}body.nav-open .overlay{display:block}.menu-toggle{display:block}main{margin-left:0;padding:60px 16px 20px}.cards{flex-direction:column}.panels{flex-direction:column}.filters{flex-direction:column}.filters input,.filters select{width:100%}}
</style>
</head>
<body class="dark">
<button class="menu-toggle" onclick="document.body.classList.toggle('nav-open')">☰</button>
<div class="overlay" onclick="document.body.classList.remove('nav-open')"></div>
<nav>
<h2>💰 Pénzügy</h2>
<a onclick="navTo('dashboard')" data-page="dashboard" class="active">📊 Dashboard</a>
<a onclick="navTo('transactions')" data-page="transactions">💳 Tranzakciók</a>
<a onclick="navTo('recurring')" data-page="recurring">🔁 Ismétlődő</a>
<a onclick="navTo('categories')" data-page="categories">📂 Kategóriák</a>
<a onclick="navTo('accounts')" data-page="accounts">🏦 Számlák</a>
<a onclick="navTo('monthly')" data-page="monthly">📅 Havi nézet</a>
<a onclick="exportCSV()">📤 Export</a>
<hr>
<a onclick="toggleTheme()" class="theme-btn">☀️ Világos</a>
</nav>
<main>
<div id="dashboard" class="page active"></div>
<div id="transactions" class="page"></div>
<div id="recurring" class="page"></div>
<div id="categories" class="page"></div>
<div id="accounts" class="page"></div>
<div id="monthly" class="page"></div>
<div id="modal" class="modal"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
// ── Data layer ──
const LS=(()=>{let mem={};const ok=(()=>{try{sessionStorage.setItem('_t','1');sessionStorage.removeItem('_t');return true}catch(e){return false}})();return {get(k,d){try{if(ok){const v=sessionStorage.getItem('penzugy_'+k);return v?JSON.parse(v):d}}catch(e){}return mem[k]!==undefined?mem[k]:d},set(k,v){mem[k]=v;if(ok)try{sessionStorage.setItem('penzugy_'+k,JSON.stringify(v))}catch(e){}}}})();

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

function seed(){
  if(!LS.get('seeded')){
    LS.set('categories',[
      {id:uid(),name:'Fizetés / Jövedelem',type:'income',hasStatus:false,active:true},
      {id:uid(),name:'Ajándék / Egyéb bevétel',type:'income',hasStatus:false,active:true},
      {id:uid(),name:'Visszatérítés',type:'income',hasStatus:false,active:true},
      {id:uid(),name:'Lakhatás (bérlet, rezsi)',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Élelmiszer, háztartás',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Közlekedés (benzin, jegy)',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Egészségügy',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Biztosítás',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Adó, illeték',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Szórakozás, étterem',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Ruházat',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Technika, eszközök',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Oktatás, Benji',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Előfizetések',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Gyerektartás',type:'expense',hasStatus:true,active:true},
      {id:uid(),name:'Extra gyerektartás',type:'expense',hasStatus:true,active:true},
      {id:uid(),name:'Benji-megtakarítás',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Megtakarítás, befektetés',type:'expense',hasStatus:false,active:true},
      {id:uid(),name:'Egyéb',type:'expense',hasStatus:false,active:true}
    ]);
    LS.set('accounts',[
      {id:uid(),name:'Folyószámla',balance:0,currency:'EUR'},
      {id:uid(),name:'Megtakarítási számla',balance:0,currency:'EUR'},
      {id:uid(),name:'Készpénz',balance:0,currency:'EUR'},
      {id:uid(),name:'Revolut',balance:0,currency:'EUR'}
    ]);
    LS.set('transactions',[]);
    LS.set('recurring',[]);
    LS.set('seeded',true);
  }
}
seed();

function cats(){return LS.get('categories',[])}
function accts(){return LS.get('accounts',[])}
function txs(){return LS.get('transactions',[])}
function recurs(){return LS.get('recurring',[])}

function catById(id){return cats().find(c=>c.id===id)}
function accById(id){return accts().find(a=>a.id===id)}

// ── Helpers ──
function fmtEUR(v){v=parseFloat(v);if(isNaN(v)||v==null)return'0,00 €';return v.toFixed(2).replace('.',',')+' €'}
function fmtDate(d){return d||new Date().toISOString().slice(0,10)}
function today(){return new Date().toISOString().slice(0,10)}
function monthStart(ym){return ym?ym+'-01':today().slice(0,7)+'-01'}
function monthEnd(ym){const[y,m]=ym.split('-').map(Number);return m===12?`${y+1}-01-01`:`${y}-${String(m+1).padStart(2,'0')}-01`}

// ── Theme ──
function toggleTheme(){const b=document.body;b.classList.toggle('light');LS.set('theme',b.classList.contains('light')?'light':'dark');document.querySelector('.theme-btn').textContent=b.classList.contains('light')?'🌙 Sötét':'☀️ Világos'}
(function(){const t=LS.get('theme','dark');if(t==='light'){document.body.classList.add('light');document.querySelector('.theme-btn').textContent='🌙 Sötét'}})()

// ── Nav ──
function navTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav a[data-page]').forEach(a=>a.classList.remove('active'));
  const pg=document.getElementById(page);if(pg)pg.classList.add('active');
  const nav=document.querySelector(`nav a[data-page="${page}"]`);if(nav)nav.classList.add('active');
  document.body.classList.remove('nav-open');
  if(page==='dashboard')renderDashboard();
  if(page==='transactions')renderTransactions();
  if(page==='recurring')renderRecurring();
  if(page==='categories')renderCategories();
  if(page==='accounts')renderAccounts();
  if(page==='monthly'){const ym=document.getElementById('monthly-ym')?.value||today().slice(0,7);renderMonthly(ym)}
}

// ── Process recurring ──
function processRecurring(){
  const tday=today();const alltxs=txs();let created=0;
  const recs=recurs().filter(r=>r.active&&r.nextDue<=tday);
  recs.forEach(r=>{
    const tpl=alltxs.find(t=>t.id===r.templateTxId);
    if(!tpl)return;
    const newTx={id:uid(),date:tday,amount:tpl.amount,type:tpl.type,categoryId:tpl.categoryId,accountId:tpl.accountId,note:tpl.note||'',status:tpl.status||null};
    alltxs.push(newTx);
    const nd=new Date(r.nextDue);
    r.frequency==='monthly'?nd.setMonth(nd.getMonth()+1):nd.setFullYear(nd.getFullYear()+1);
    r.nextDue=nd.toISOString().slice(0,10);
    if(nd.getDate()!==r.dayOfMonth)r.nextDue=fmtDate(new Date(nd.getFullYear(),nd.getMonth(),Math.min(r.dayOfMonth,new Date(nd.getFullYear(),nd.getMonth()+1,0).getDate())));
    created++;
  });
  if(created){LS.set('transactions',alltxs);LS.set('recurring',recs)}
}

// ── Modal ──
function showModal(html){const m=document.getElementById('modal');m.innerHTML=`<div class="modal-box">${html}</div>`;m.classList.add('show')}
function hideModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)hideModal()});

// ═══════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════
function renderDashboard(){
  processRecurring();
  const alltxs=txs();const ac=accts();const ms=monthStart(today().slice(0,7));
  const totalBal=ac.reduce((s,a)=>s+(a.balance||0),0);
  const monthTxs=alltxs.filter(t=>t.date>=ms);
  const income=monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=income-expense;

  // Child support status
  const childCats=cats().filter(c=>c.hasStatus&&c.active);
  const childTxs=monthTxs.filter(t=>childCats.some(c=>c.id===t.categoryId));

  // Top categories
  const catMap={};
  monthTxs.filter(t=>t.type==='expense').forEach(t=>{
    const c=catById(t.categoryId);const n=c?c.name:'?';
    catMap[n]=(catMap[n]||0)+t.amount;
  });
  const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // Last 10
  const last10=[...alltxs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,10);

  let html=`
<h1>📊 Dashboard</h1>
<div class="cards">
<div class="card"><div class="card-label">Egyenleg</div><div class="card-value">${fmtEUR(totalBal)}</div></div>
<div class="card income"><div class="card-label">Havi bevétel</div><div class="card-value">${fmtEUR(income)}</div></div>
<div class="card expense"><div class="card-label">Havi kiadás</div><div class="card-value">${fmtEUR(expense)}</div></div>
</div>
<div class="c-balance ${bal>=0?'pos':'neg'}">Havi egyenleg: ${fmtEUR(bal)}</div>`;

  if(childTxs.length){
    html+='<div class="child-status"><h2>🧒 Gyerektartás státusz</h2>';
    childTxs.forEach(t=>{
      const c=catById(t.categoryId);
      html+=`<div class="child-row"><span class="child-name">${c?c.name:'?'}</span><span class="child-amount">${fmtEUR(t.amount)}</span><span class="${t.status==='paid'?'child-paid':'child-unpaid'}">${t.status==='paid'?'✅ Fizetve':'❌ Nincs fizetve'}</span></div>`;
    });
    html+='</div>';
  }

  html+='<div class="panels"><div class="panel"><h2>📈 Top kiadási kategóriák</h2>';
  if(topCats.length)html+='<canvas id="pieChart" width="300" height="300"></canvas>';
  else html+='<p class="empty">Nincs adat ebben a hónapban.</p>';
  html+='</div><div class="panel"><h2>🕐 Utolsó tranzakciók</h2>';
  if(last10.length){
    html+='<table><thead><tr><th>Dátum</th><th>Összeg</th><th>Kategória</th><th>Számla</th></tr></thead><tbody>';
    last10.forEach(t=>{
      const c=catById(t.categoryId);const a=accById(t.accountId);
      html+=`<tr><td>${t.date}</td><td class="${t.type}">${t.type==='income'?'':'-'}${fmtEUR(t.amount)}</td><td>${c?c.name:'?'}</td><td>${a?a.name:'?'}</td></tr>`;
    });
    html+='</tbody></table>';
  }else html+='<p class="empty">Még nincs tranzakció.</p>';
  html+='</div></div>';

  document.getElementById('dashboard').innerHTML=html;

  if(topCats.length)setTimeout(()=>{
    const labels=topCats.map(e=>e[0]),values=topCats.map(e=>e[1]);
    new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels,datasets:[{data:values}]},options:{plugins:{legend:{position:'right'}}}});
  },100);
}

// ═══════════════════════════════════════════════════════════
// TRANSACTIONS
// ═══════════════════════════════════════════════════════════
function renderTransactions(filters={}){
  const alltxs=txs();let filtered=[...alltxs];
  if(filters.dateFrom)filtered=filtered.filter(t=>t.date>=filters.dateFrom);
  if(filters.dateTo)filtered=filtered.filter(t=>t.date<=filters.dateTo);
  if(filters.categoryId)filtered=filtered.filter(t=>t.categoryId===filters.categoryId);
  if(filters.type)filtered=filtered.filter(t=>t.type===filters.type);
  if(filters.accountId)filtered=filtered.filter(t=>t.accountId===filters.accountId);
  if(filters.status)filtered=filtered.filter(t=>t.status===filters.status);
  if(filters.search)filtered=filtered.filter(t=>(t.note||'').toLowerCase().includes(filters.search.toLowerCase()));
  filtered.sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));

  const catOpts=cats().filter(c=>c.active).map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  const accOpts=accts().map(a=>`<option value="${a.id}">${a.name}</option>`).join('');

  let html=`
<h1>💳 Tranzakciók</h1>
<div class="filters">
<input type="date" id="f-dateFrom" value="${filters.dateFrom||''}" placeholder="Dátumtól">
<input type="date" id="f-dateTo" value="${filters.dateTo||''}" placeholder="Dátumig">
<select id="f-cat"><option value="">Minden</option>${catOpts}</select>
<select id="f-type"><option value="">Minden</option><option value="income">Bevétel</option><option value="expense">Kiadás</option></select>
<select id="f-acc"><option value="">Minden</option>${accOpts}</select>
<select id="f-status"><option value="">Minden</option><option value="paid">Fizetve</option><option value="unpaid">Nincs fizetve</option></select>
<input type="text" id="f-search" value="${filters.search||''}" placeholder="Keresés...">
<button class="btn" onclick="applyFilters()">🔍 Szűrés</button>
<button class="btn" onclick="renderTransactions()">✖ Törlés</button>
</div>
<script>
document.getElementById('f-cat').value='${filters.categoryId||''}';
document.getElementById('f-type').value='${filters.type||''}';
document.getElementById('f-acc').value='${filters.accountId||''}';
document.getElementById('f-status').value='${filters.status||''}';
<\/script>
<button class="btn accent" onclick="txForm()">+ Új tranzakció</button>`;

  if(filtered.length){
    html+='<table><thead><tr><th>Dátum</th><th>Összeg</th><th>Típus</th><th>Kategória</th><th>Számla</th><th>Státusz</th><th>Megjegyzés</th><th></th></tr></thead><tbody>';
    filtered.forEach(t=>{
      const c=catById(t.categoryId);const a=accById(t.accountId);
      const st=t.status==='paid'?'✅ Fizetve':t.status==='unpaid'?'❌ Nincs fizetve':'—';
      html+=`<tr><td>${t.date}</td><td class="${t.type}">${fmtEUR(t.amount)}</td><td>${t.type==='income'?'Bevétel':'Kiadás'}</td><td>${c?c.name:'?'}</td><td>${a?a.name:'?'}</td><td>${st}</td><td>${t.note||''}</td><td class="actions"><button class="btn-sm" onclick="txForm('${t.id}')">✏️</button><button class="btn-sm btn-danger" onclick="deleteTx('${t.id}')">🗑️</button></td></tr>`;
    });
    html+='</tbody></table>';
  }else html+='<p class="empty">Nincs találat.</p>';

  document.getElementById('transactions').innerHTML=html;
}

function applyFilters(){
  renderTransactions({
    dateFrom:document.getElementById('f-dateFrom').value,
    dateTo:document.getElementById('f-dateTo').value,
    categoryId:document.getElementById('f-cat').value,
    type:document.getElementById('f-type').value,
    accountId:document.getElementById('f-acc').value,
    status:document.getElementById('f-status').value,
    search:document.getElementById('f-search').value
  });
}

function txForm(editId){
  const t=editId?txs().find(x=>x.id===editId):null;
  const catOpts=cats().filter(c=>c.active).map(c=>`<option value="${c.id}" data-has="${c.hasStatus}">${c.name}</option>`).join('');
  const accOpts=accts().map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  const cat=t?catById(t.categoryId):null;
  const hasSt=cat?cat.hasStatus:false;

  showModal(`
<h2>${t?'Szerkesztés':'Új tranzakció'}</h2>
<form onsubmit="saveTx(event,'${editId||''}')">
<label>Dátum: <input type="date" id="tx-date" value="${t?t.date:today()}" required></label>
<label>Összeg (€): <input type="text" id="tx-amount" value="${t?t.amount:''}" placeholder="pl. 150,50" required></label>
<label>Típus: <select id="tx-type"><option value="expense" ${t&&t.type==='expense'?'selected':''}>Kiadás</option><option value="income" ${t&&t.type==='income'?'selected':''}>Bevétel</option></select></label>
<label>Kategória: <select id="tx-cat" onchange="toggleTxStatus()">${catOpts}</select></label>
<label>Számla: <select id="tx-acc">${accOpts}</select></label>
<label id="tx-status-label" style="display:${hasSt?'block':'none'}">Státusz: <select id="tx-status"><option value="unpaid">Nincs fizetve</option><option value="paid" ${t&&t.status==='paid'?'selected':''}>Fizetve</option></select></label>
<label>Megjegyzés: <input type="text" id="tx-note" value="${t?t.note||'':''}" maxlength="200"></label>
<div style="margin-top:16px;display:flex;gap:8px">
<button type="submit" class="btn accent">${t?'Mentés':'Rögzítés'}</button>
<button type="button" class="btn" onclick="hideModal()">Mégsem</button>
</div>
</form>
<script>
${t?`document.getElementById('tx-cat').value='${t.categoryId}';document.getElementById('tx-acc').value='${t.accountId}';`:''}
function toggleTxStatus(){const s=document.getElementById('tx-cat');const o=s.options[s.selectedIndex];const h=o?o.dataset.has==='true':false;document.getElementById('tx-status-label').style.display=h?'block':'none'}
<\/script>`);
}

function saveTx(e,editId){
  e.preventDefault();
  const d=document.getElementById('tx-date').value;
  const amt=parseFloat(document.getElementById('tx-amount').value.replace(',','.'));
  const type=document.getElementById('tx-type').value;
  const catId=document.getElementById('tx-cat').value;
  const accId=document.getElementById('tx-acc').value;
  const note=document.getElementById('tx-note').value;
  const cat=catById(catId);
  const status=cat&&cat.hasStatus?document.getElementById('tx-status').value:null;
  if(!amt||amt<=0)return alert('Adj meg pozitív összeget!');
  const all=txs();
  if(editId){const i=all.findIndex(t=>t.id===editId);if(i>=0){all[i]={...all[i],date:d,amount:amt,type,categoryId:catId,accountId:accId,note,status}}}
  else all.push({id:uid(),date:d,amount:amt,type,categoryId:catId,accountId:accId,note,status});
  LS.set('transactions',all);
  hideModal();renderTransactions();
}

function deleteTx(id){if(confirm('Biztosan törlöd?')){LS.set('transactions',txs().filter(t=>t.id!==id));recurs().forEach(r=>{if(r.templateTxId===id){LS.set('recurring',recurs().filter(x=>x.id!==r.id))}});renderTransactions()}}

// ═══════════════════════════════════════════════════════════
// RECURRING
// ═══════════════════════════════════════════════════════════
function renderRecurring(){
  const allrec=recurs();const alltxs=txs();
  let html=`<h1>🔁 Ismétlődő tételek</h1>
<div class="toolbar"><button class="btn accent" onclick="recForm()">+ Új ismétlődő tétel</button><button class="btn" onclick="processRecurring();renderDashboard();renderRecurring()">▶ Futtatás most</button></div>`;
  if(allrec.length){
    html+='<table><thead><tr><th>Összeg</th><th>Típus</th><th>Kategória</th><th>Számla</th><th>Gyakoriság</th><th>Nap</th><th>Köv.</th><th>Aktív</th><th></th></tr></thead><tbody>';
    allrec.forEach(r=>{
      const t=alltxs.find(x=>x.id===r.templateTxId);if(!t)return;
      const c=catById(t.categoryId);const a=accById(t.accountId);
      html+=`<tr><td class="${t.type}">${fmtEUR(t.amount)}</td><td>${t.type==='income'?'Bevétel':'Kiadás'}</td><td>${c?c.name:'?'}</td><td>${a?a.name:'?'}</td><td>${r.frequency==='monthly'?'Havi':'Éves'}</td><td>${r.dayOfMonth}.</td><td>${r.nextDue}</td><td>${r.active?'✅':'❌'}</td><td class="actions"><button class="btn-sm" onclick="toggleRec('${r.id}')">${r.active?'⏸':'▶'}</button><button class="btn-sm btn-danger" onclick="deleteRec('${r.id}')">🗑️</button></td></tr>`;
    });
    html+='</tbody></table>';
  }else html+='<p class="empty">Még nincs ismétlődő tétel.</p>';
  document.getElementById('recurring').innerHTML=html;
}

function recForm(){
  const catOpts=cats().filter(c=>c.active).map(c=>`<option value="${c.id}" data-has="${c.hasStatus}">${c.name}</option>`).join('');
  const accOpts=accts().map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  showModal(`
<h2>Új ismétlődő tétel</h2>
<form onsubmit="saveRec(event)">
<label>Dátum (sablon): <input type="date" id="rec-date" value="${today()}" required></label>
<label>Összeg (€): <input type="text" id="rec-amount" placeholder="pl. 500,00" required></label>
<label>Típus: <select id="rec-type"><option value="expense">Kiadás</option><option value="income">Bevétel</option></select></label>
<label>Kategória: <select id="rec-cat" onchange="toggleRecStatus()">${catOpts}</select></label>
<label>Számla: <select id="rec-acc">${accOpts}</select></label>
<label id="rec-status-label" style="display:none">Státusz: <select id="rec-status"><option value="unpaid">Nincs fizetve</option><option value="paid">Fizetve</option></select></label>
<label>Gyakoriság: <select id="rec-freq"><option value="monthly">Havi</option><option value="yearly">Éves</option></select></label>
<label>Nap (1-28): <input type="number" id="rec-day" min="1" max="28" value="1" required></label>
<label>Köv. esedékesség: <input type="date" id="rec-next" value="${today()}" required></label>
<label>Megjegyzés: <input type="text" id="rec-note" maxlength="200"></label>
<div style="margin-top:16px;display:flex;gap:8px">
<button type="submit" class="btn accent">Létrehozás</button>
<button type="button" class="btn" onclick="hideModal()">Mégsem</button>
</div>
</form>
<script>
function toggleRecStatus(){const s=document.getElementById('rec-cat');const o=s.options[s.selectedIndex];const h=o?o.dataset.has==='true':false;document.getElementById('rec-status-label').style.display=h?'block':'none'}
<\/script>`);
}

function saveRec(e){
  e.preventDefault();
  const date=document.getElementById('rec-date').value;
  const amt=parseFloat(document.getElementById('rec-amount').value.replace(',','.'));
  const type=document.getElementById('rec-type').value;
  const catId=document.getElementById('rec-cat').value;
  const accId=document.getElementById('rec-acc').value;
  const note=document.getElementById('rec-note').value;
  const cat=catById(catId);
  const status=cat&&cat.hasStatus?document.getElementById('rec-status').value:null;
  const templateId=uid();
  const alltxs=txs();alltxs.push({id:templateId,date,amount:amt,type,categoryId:catId,accountId:accId,note,status});
  LS.set('transactions',alltxs);
  const allrec=recurs();allrec.push({id:uid(),templateTxId:templateId,frequency:document.getElementById('rec-freq').value,dayOfMonth:parseInt(document.getElementById('rec-day').value),nextDue:document.getElementById('rec-next').value,active:true});
  LS.set('recurring',allrec);
  hideModal();renderRecurring();
}

function toggleRec(id){const r=recurs();const i=r.findIndex(x=>x.id===id);if(i>=0){r[i].active=!r[i].active;LS.set('recurring',r);renderRecurring()}}
function deleteRec(id){if(confirm('Biztosan törlöd?')){const r=recurs().find(x=>x.id===id);LS.set('recurring',recurs().filter(x=>x.id!==id));if(r){LS.set('transactions',txs().filter(t=>t.id!==r.templateTxId))}renderRecurring()}}

// ═══════════════════════════════════════════════════════════
// CATEGORIES
// ═══════════════════════════════════════════════════════════
function renderCategories(){
  const all=cats();
  let html=`<h1>📂 Kategóriák</h1><button class="btn accent" onclick="catForm()">+ Új kategória</button><table><thead><tr><th>Név</th><th>Típus</th><th>Státusz mező</th><th>Aktív</th><th></th></tr></thead><tbody>`;
  all.forEach(c=>{html+=`<tr><td>${c.name}</td><td>${c.type==='income'?'Bevétel':'Kiadás'}</td><td>${c.hasStatus?'igen':'nem'}</td><td>${c.active?'✅':'❌'}</td><td class="actions"><button class="btn-sm" onclick="catForm('${c.id}')">✏️</button><button class="btn-sm" onclick="toggleCat('${c.id}')">${c.active?'❌':'✅'}</button></td></tr>`});
  html+='</tbody></table>';
  document.getElementById('categories').innerHTML=html;
}

function catForm(editId){
  const c=editId?cats().find(x=>x.id===editId):null;
  showModal(`
<h2>${c?'Szerkesztés':'Új kategória'}</h2>
<form onsubmit="saveCat(event,'${editId||''}')">
<label>Név: <input type="text" id="cat-name" value="${c?c.name:''}" required></label>
<label>Típus: <select id="cat-type"><option value="expense" ${c&&c.type==='expense'?'selected':''}>Kiadás</option><option value="income" ${c&&c.type==='income'?'selected':''}>Bevétel</option></select></label>
<label><input type="checkbox" id="cat-hasStatus" ${c&&c.hasStatus?'checked':''}> Fizetve/nem státusz</label>
<div style="margin-top:16px;display:flex;gap:8px">
<button type="submit" class="btn accent">${c?'Mentés':'Létrehozás'}</button>
<button type="button" class="btn" onclick="hideModal()">Mégsem</button>
</div>
</form>`);
}

function saveCat(e,editId){
  e.preventDefault();
  const name=document.getElementById('cat-name').value;
  const type=document.getElementById('cat-type').value;
  const hs=document.getElementById('cat-hasStatus').checked;
  const all=cats();
  if(editId){const i=all.findIndex(x=>x.id===editId);if(i>=0){all[i].name=name;all[i].type=type;all[i].hasStatus=hs}}
  else all.push({id:uid(),name,type,hasStatus:hs,active:true});
  LS.set('categories',all);hideModal();renderCategories();
}

function toggleCat(id){const all=cats();const i=all.findIndex(x=>x.id===id);if(i>=0){all[i].active=!all[i].active;LS.set('categories',all);renderCategories()}}

// ═══════════════════════════════════════════════════════════
// ACCOUNTS
// ═══════════════════════════════════════════════════════════
function renderAccounts(){
  const all=accts();
  let html=`<h1>🏦 Számlák</h1><button class="btn accent" onclick="accForm()">+ Új számla</button><table><thead><tr><th>Név</th><th>Egyenleg</th><th>Pénznem</th><th></th></tr></thead><tbody>`;
  all.forEach(a=>{html+=`<tr><td>${a.name}</td><td>${fmtEUR(a.balance)}</td><td>${a.currency||'EUR'}</td><td class="actions"><button class="btn-sm" onclick="accForm('${a.id}')">✏️</button><button class="btn-sm btn-danger" onclick="deleteAcc('${a.id}')">🗑️</button></td></tr>`});
  html+='</tbody></table>';
  document.getElementById('accounts').innerHTML=html;
}

function accForm(editId){
  const a=editId?accts().find(x=>x.id===editId):null;
  showModal(`
<h2>${a?'Szerkesztés':'Új számla'}</h2>
<form onsubmit="saveAcc(event,'${editId||''}')">
<label>Név: <input type="text" id="acc-name" value="${a?a.name:''}" required></label>
<label>Egyenleg: <input type="text" id="acc-bal" value="${a?a.balance:'0'}"></label>
<label>Pénznem: <select id="acc-curr"><option value="EUR" ${a&&a.currency==='EUR'?'selected':''}>EUR</option><option value="HUF">HUF</option><option value="USD">USD</option></select></label>
<div style="margin-top:16px;display:flex;gap:8px">
<button type="submit" class="btn accent">${a?'Mentés':'Létrehozás'}</button>
<button type="button" class="btn" onclick="hideModal()">Mégsem</button>
</div>
</form>`);
}

function saveAcc(e,editId){
  e.preventDefault();
  const name=document.getElementById('acc-name').value;
  const bal=parseFloat(document.getElementById('acc-bal').value.replace(',','.'))||0;
  const curr=document.getElementById('acc-curr').value;
  const all=accts();
  if(editId){const i=all.findIndex(x=>x.id===editId);if(i>=0){all[i].name=name;all[i].balance=bal;all[i].currency=curr}}
  else all.push({id:uid(),name,balance:bal,currency:curr});
  LS.set('accounts',all);hideModal();renderAccounts();
}

function deleteAcc(id){if(confirm('Biztosan törlöd?')){LS.set('accounts',accts().filter(a=>a.id!==id));renderAccounts()}}

// ═══════════════════════════════════════════════════════════
// MONTHLY
// ═══════════════════════════════════════════════════════════
function renderMonthly(ym){
  ym=ym||today().slice(0,7);
  const ms=monthStart(ym),me=monthEnd(ym);
  const monthTxs=txs().filter(t=>t.date>=ms&&t.date<me).sort((a,b)=>b.date.localeCompare(a.date));
  const income=monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const[y,m]=ym.split('-').map(Number);
  const prev=m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;
  const next=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;

  let html=`
<h1>📅 Havi nézet</h1>
<div class="month-nav">
<button class="btn" onclick="renderMonthly('${prev}')">◀ ${prev}</button>
<span>${ym}</span>
<button class="btn" onclick="renderMonthly('${next}')">${next} ▶</button>
</div>
<div class="cards">
<div class="card income"><div class="card-label">Bevétel</div><div class="card-value">${fmtEUR(income)}</div></div>
<div class="card expense"><div class="card-label">Kiadás</div><div class="card-value">${fmtEUR(expense)}</div></div>
<div class="card"><div class="card-label">Egyenleg</div><div class="card-value">${fmtEUR(income-expense)}</div></div>
</div>`;
  if(monthTxs.length){
    html+='<table><thead><tr><th>Dátum</th><th>Összeg</th><th>Típus</th><th>Kategória</th><th>Számla</th><th>Megjegyzés</th></tr></thead><tbody>';
    monthTxs.forEach(t=>{const c=catById(t.categoryId);const a=accById(t.accountId);html+=`<tr><td>${t.date}</td><td class="${t.type}">${fmtEUR(t.amount)}</td><td>${t.type==='income'?'Bevétel':'Kiadás'}</td><td>${c?c.name:'?'}</td><td>${a?a.name:'?'}</td><td>${t.note||''}</td></tr>`});
    html+='</tbody></table>';
  }else html+='<p class="empty">Nincs tranzakció ebben a hónapban.</p>';
  document.getElementById('monthly').innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════════════════════
function exportCSV(){
  const alltxs=[...txs()].sort((a,b)=>b.date.localeCompare(a.date));
  let csv='Dátum,Összeg,Típus,Kategória,Megjegyzés,Számla,Státusz\n';
  alltxs.forEach(t=>{const c=catById(t.categoryId);const a=accById(t.accountId);csv+=`${t.date},${t.amount},${t.type==='income'?'bevétel':'kiadás'},"${c?c.name:''}","${(t.note||'').replace(/"/g,'""')}",${a?a.name:''},${t.status||''}\n`});
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=url;a.download=`penzugy_export_${today()}.csv`;a.click();
  URL.revokeObjectURL(url);
}

renderDashboard();
